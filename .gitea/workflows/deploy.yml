name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: hetzner
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy
        run: |
          rm -rf /var/www/matejhoz/*
          cp -r packages/client/dist/* /var/www/matejhoz/
